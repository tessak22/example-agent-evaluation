version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - APP_NAME=cpln-eval-api
      - PORT=8080
    x-cpln:
      type: serverless
      containers:
        - name: api
          cpu: 50m
          memory: 128Mi
          port: 8080
      defaultOptions:
        autoscaling:
          metric: concurrency
          target: 100
          minScale: 0
          maxScale: 5

  worker:
    build: .
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=production
      - APP_NAME=cpln-eval-worker
      - PORT=8081
    x-cpln:
      type: standard
      containers:
        - name: worker
          cpu: 100m
          memory: 256Mi
      defaultOptions:
        autoscaling:
          minScale: 1
          maxScale: 3
