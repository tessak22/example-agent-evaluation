kind: workload
name: api
spec:
  type: standard
  containers:
    - name: api
      image: node:20-alpine
      cpu: 200m
      memory: 256Mi
      minCpu: 50m
      minMemory: 128Mi
      ports:
        - protocol: http
          number: 8080
      env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: '8080'
  defaultOptions:
    autoscaling:
      minScale: 2
      maxScale: 2
    capacityAI: false
  firewallConfig:
    external:
      inboundAllowCIDR: []
      outboundAllowCIDR:
        - 0.0.0.0/0
    internal:
      inboundAllowType: none
      inboundAllowWorkload: []
tags:
  app: api

